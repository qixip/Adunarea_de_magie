<div class="gallery-page">

  <!-- Header -->
  <header class="gallery-header">
    <h1 class="gallery-title">Galerie Evenimente</h1>
    <p class="gallery-subtitle">Momente din turneele, draft-urile și prerelease-urile comunității noastre din București.</p>
  </header>

  <!-- Filter bar -->
  <nav class="gallery-filters" aria-label="Filtrează galeria">
    <button
      *ngFor="let cat of categories"
      class="filter-btn"
      [class.active]="activeCategory === cat"
      (click)="setCategory(cat)">
      {{ categoryLabels[cat] }}
    </button>
  </nav>

  <!-- Mosaic grid -->
  <div class="gallery-grid">
    <div
      class="gallery-item"
      *ngFor="let img of filtered; let i = index; trackBy: trackByIndex"
      [ngClass]="img.spanClass"
      (click)="openLightbox(i)"
      role="button"
      tabindex="0"
      [attr.aria-label]="'Deschide fotografia ' + (img.index + 1)"
      (keydown.enter)="openLightbox(i)">
      <img
        [src]="img.src"
        [alt]="'Foto eveniment ' + (img.index + 1)"
        loading="lazy"
        decoding="async" />
      <div class="item-overlay" aria-hidden="true">
        <i class="fas fa-search-plus"></i>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div
    class="lightbox"
    *ngIf="lightboxIndex !== null"
    role="dialog"
    aria-modal="true"
    aria-label="Vizualizare fotografie"
    (click)="closeLightbox()">

    <button class="lb-close" (click)="closeLightbox()" aria-label="Închide">
      <i class="fas fa-times"></i>
    </button>

    <button class="lb-nav lb-prev" (click)="$event.stopPropagation(); prev()" aria-label="Anterioară">
      <i class="fas fa-chevron-left"></i>
    </button>

    <div class="lb-img-wrap" (click)="$event.stopPropagation()">
      <img
        *ngIf="lightboxImage"
        [src]="lightboxImage!.src"
        [alt]="'Foto eveniment ' + (lightboxImage!.index + 1)" />
    </div>

    <button class="lb-nav lb-next" (click)="$event.stopPropagation(); next()" aria-label="Următoarea">
      <i class="fas fa-chevron-right"></i>
    </button>

    <div class="lb-counter" (click)="$event.stopPropagation()">
      {{ lightboxIndex + 1 }} / {{ filtered.length }}
    </div>

  </div>

</div>
