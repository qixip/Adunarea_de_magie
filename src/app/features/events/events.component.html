<div class="events-page">
  <app-events-hero></app-events-hero>

  <section class="events-section container" aria-labelledby="events-list-title">
    <app-events-filter-toolbar
      [formats]="formats"
      [activeFormat]="activeFormat"
      (formatChange)="setFormat($event)">
    </app-events-filter-toolbar>

    <div class="events-grid" *ngIf="filtered.length; else noEvents">
      <div
        class="card-clickable"
        *ngFor="let event of filtered; trackBy: trackByEventId"
        (click)="openModal(event)"
        role="button"
        tabindex="0"
        [attr.aria-label]="'Detalii eveniment: ' + event.title"
        (keydown.enter)="openModal(event)">
        <app-event-card [event]="event"></app-event-card>
      </div>
    </div>

    <ng-template #noEvents>
      <div class="empty-state">
        <i class="fas fa-calendar-times" aria-hidden="true"></i>
        <p>Nu există evenimente pentru filtrul selectat.</p>
      </div>
    </ng-template>
  </section>

  <!-- Event detail modal -->
  <app-event-detail-modal
    *ngIf="selectedEvent"
    [event]="selectedEvent!"
    (close)="closeModal()"
    (registered)="onRegistered()">
  </app-event-detail-modal>

</div>
