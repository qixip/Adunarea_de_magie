<form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form" novalidate>
  <div class="form-group">
    <label for="login-email">Email</label>
    <input
      id="login-email"
      type="email"
      formControlName="email"
      class="form-control"
      [class.invalid]="emailControl?.invalid && emailControl?.touched"
      placeholder="email@exemplu.ro">
    <span class="field-error" *ngIf="emailControl?.hasError('required') && emailControl?.touched">Emailul este obligatoriu.</span>
    <span class="field-error" *ngIf="emailControl?.hasError('email') && emailControl?.touched">Format email invalid.</span>
  </div>

  <div class="form-group">
    <label for="login-pass">Parola</label>
    <input
      id="login-pass"
      type="password"
      formControlName="password"
      class="form-control"
      [class.invalid]="passwordControl?.invalid && passwordControl?.touched"
      placeholder="Parola ta">
    <span class="field-error" *ngIf="passwordControl?.hasError('required') && passwordControl?.touched">Parola este obligatorie.</span>
  </div>

  <p class="server-error" *ngIf="error" role="alert">
    <i class="fas fa-exclamation-circle"></i>
    {{ error }}
  </p>

  <button type="submit" class="btn btn-primary btn-lg btn-block" [disabled]="form.invalid || isLoading">
    <i class="fas fa-sign-in-alt" aria-hidden="true"></i>
    {{ isLoading ? 'Se încarcă...' : 'Autentifică-te' }}
  </button>
</form>
