<footer class="footer">
  <div class="container footer-content">
    <div class="footer-brand">
      <img src="assets/images/Logo_no_background.png" alt="Adunarea de Magie" height="48">
      <p class="footer-tagline">Hub Evenimente MTG București</p>
    </div>

    <div class="footer-social">
      <h3>Comunitate</h3>
      <div class="social-links">
        <a *ngFor="let s of socialLinks" [href]="s.url" target="_blank" rel="noopener noreferrer" class="social-link" [attr.aria-label]="s.name">
          <i [class]="s.icon"></i>
          <span>{{ s.name }}</span>
        </a>
      </div>
    </div>

    <div class="footer-contact">
      <h3>Contact</h3>
      <p>contact&#64;adunareademagie.ro</p>
      <p class="footer-location">
         Bulevardul Ferdinand I 126A, București 
        <br><a class="maps-btn maps-btn-sm" href="https://www.google.com/maps/place/Bulevardul+Ferdinand+I+126A,+021396+Bucure%C8%99ti/@44.4464722,26.1283407,16.75z/data=!4m6!3m5!1s0x40b1f8d31aeb9fa9:0xe24bb3ef33e72776!8m2!3d44.443737!4d26.131302!16s%2Fg%2F11tnm1x1x0?entry=ttu&amp;g_ep=EgoyMDI2MDQxNS4wIKXMDSoASAFQAw%3D%3D"
           target="_blank" rel="noopener noreferrer" aria-label="Deschide in Google Maps">
          <i class="fas fa-map-marker-alt" aria-hidden="true"></i> Maps
        </a>
      </p>
    </div>
  </div>

  <div class="footer-bottom">
    <div class="container">
      <p>&copy; {{ currentYear }} Adunarea de Magie</p>
      <div class="footer-legal">
        <a routerLink="/legal/termeni">Termeni</a>
        <span>•</span>
        <a routerLink="/legal/confidentialitate">Confidențialitate</a>
      </div>
    </div>
  </div>
</footer>
